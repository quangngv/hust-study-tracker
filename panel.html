<div class="fab-stack" id="fabStack">
  <button class="fab" id="courseFabBtn" type="button" aria-label="Mở quản lý học phần">
    <span>Quản lý học phần</span>
  </button>
  <button class="fab fab-secondary" id="marksFabBtn" type="button" aria-label="Mở quản lý điểm số">
    <span>Quản lý điểm số</span>
  </button>
  <button class="fab fab-secondary" id="generalFabBtn" type="button" aria-label="Mở quản lý tổng quát">
    <span>Quản lý tổng quát</span>
  </button>
  <button class="fab fab-toggle" id="toggleFabBtn" type="button" aria-label="Ẩn/Hiện menu">
    <svg class="icon-close" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
      <line x1="1" y1="1" x2="23" y2="23"></line>
    </svg>
    <img class="logo-img" src="" alt="HUST Logo" style="display: none;" />
    <span>Ẩn nút</span>
  </button>
</div>

<template id="loadingTemplate">
  <div class="backdrop" id="backdrop">
    <section class="panel loading-panel" role="dialog" aria-modal="true" aria-labelledby="loadingTitle">
      <header class="panel-head">
        <div>
          <p class="eyebrow">CTT-SIS HUST</p>
          <h2 id="loadingTitle">Đang tải học phần</h2>
          <p class="sub">Đang mở bảng Chương trình đào tạo và tổng hợp dữ liệu.</p>
        </div>
        <div class="btn-row">
          <button class="icon-btn close-btn" id="closeBtn" type="button" title="Đóng">× <span>Đóng</span></button>
        </div>
      </header>
      <div class="loading-state">
        <div class="spinner" aria-hidden="true"></div>
        <p>Vui lòng chờ trong giây lát.</p>
      </div>
    </section>
  </div>
</template>

<template id="marksTemplate">
  <div class="backdrop" id="backdrop">
    <section class="panel" role="dialog" aria-modal="true" aria-labelledby="marksTitle">
      <header class="panel-head">
        <div>
          <p class="eyebrow">CTT-SIS HUST</p>
          <h2 id="marksTitle">Xếp hạng điểm học phần</h2>
          <p class="sub">Dữ liệu được quét trực tiếp từ bảng điểm cá nhân hiện tại.</p>
        </div>
        <div class="btn-row">
          <button class="icon-btn close-btn" id="closeBtn" type="button" title="Đóng">× <span>Đóng</span></button>
        </div>
      </header>

      <section class="overview marks-overview" aria-label="Tổng quan điểm">
        <article class="summary-card marks-grade-card">
          <div class="section-title">
            <p class="label">Phân bố điểm</p>
            <span class="soft-pill">Cao nhất</span>
          </div>
          <div id="marksGradeChart"></div>
        </article>
        <article class="summary-card marks-calc-card" style="display: flex; flex-direction: column; justify-content: space-between; min-height: 200px;">
          <div>
            <div class="section-title" style="margin-bottom: 8px;">
              <p class="label">Tính toán điểm chọn</p>
              <span class="soft-pill" id="calcCountPill">Đã chọn 0 môn</span>
            </div>
            <div class="calc-results" style="display: flex; gap: 20px; align-items: center; margin-top: 8px;">
              <div>
                <p class="label" style="font-size: 11px;">CPA đã chọn</p>
                <p class="metric" style="font-size: 32px; margin: 4px 0;" id="calcCpa">-</p>
              </div>
              <div>
                <p class="label" style="font-size: 11px;">Tín chỉ tích lũy</p>
                <p class="metric" style="font-size: 32px; margin: 4px 0;" id="calcCredits">0 <small style="font-size: 14px;">TC</small></p>
              </div>
            </div>
            <p class="caption" style="margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.3;">Tích chọn các môn dưới bảng để tự động tính toán CPA và số tín chỉ tương ứng.</p>
          </div>
          
          <div class="predict-form" style="margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 12px;">
            <p class="label" style="font-size: 11px; margin-bottom: 6px; color: var(--info);">Dự đoán điểm môn mới</p>
            <div style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center;">
              <input type="text" id="predCode" placeholder="Mã HP (vd: IT3100)" style="flex: 1; min-width: 80px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 12px;" />
              <input type="text" id="predName" placeholder="Tên môn học (tùy chọn)" style="flex: 2; min-width: 120px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 12px;" />
              <input type="number" id="predCredit" placeholder="TC" min="1" max="15" value="3" style="width: 50px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 12px;" />
              <select id="predGrade" style="padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; background: white;">
                <option value="A+">A+</option>
                <option value="A">A</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="F">F</option>
              </select>
              <button type="button" id="addPredBtn" style="min-height: 28px; padding: 4px 10px; cursor: pointer; background: var(--info-soft); color: var(--info); border: 1px solid #C9E0F7; border-radius: 4px; font-size: 12px; font-weight: bold;">+ Thêm môn</button>
            </div>
          </div>
        </article>
      </section>

      <section class="section-block">
        <div class="section-title">
          <h3>Danh sách học phần</h3>
          <div class="sort-control">
            <button class="sort-icon-btn" id="marksSortToggleBtn" type="button" title="Đổi thứ tự sắp xếp" aria-label="Đổi thứ tự sắp xếp">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 7h11"></path>
                <path d="M8 12h8"></path>
                <path d="M8 17h5"></path>
                <path d="M4 7v10"></path>
                <path d="m2 15 2 2 2-2"></path>
              </svg>
            </button>
            <span class="soft-pill" id="marksSortLabel">Tốt nhất trước</span>
          </div>
        </div>
        <div class="filter-control-panel" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center;">
          <input type="text" id="marksSearchInput" placeholder="Tìm mã hoặc tên học phần..." style="flex: 1; min-width: 180px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px;" />
          <select id="marksFilterTerm" style="padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px; cursor: pointer; background: white; color: var(--ink);">
            <option value="all">Tất cả học kỳ</option>
          </select>
          <select id="marksFilterGrade" style="padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px; cursor: pointer; background: white; color: var(--ink);">
            <option value="all">Tất cả điểm</option>
            <option value="A">Điểm A / A+</option>
            <option value="B">Điểm B / B+</option>
            <option value="C">Điểm C / C+</option>
            <option value="D">Điểm D / D+</option>
            <option value="F">Điểm F (Trượt)</option>
          </select>
          <select id="marksFilterStatus" style="padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px; cursor: pointer; background: white; color: var(--ink);">
            <option value="all">Tất cả môn</option>
            <option value="real">Môn học gốc</option>
            <option value="predicted">Môn học dự kiến</option>
            <option value="improved">Môn đã cải thiện</option>
            <option value="passed">Môn đã đỗ (qua môn)</option>
            <option value="failed">Môn trượt / nợ</option>
          </select>
          <button type="button" id="clearFiltersBtn" style="min-height: 28px; padding: 4px 10px; cursor: pointer; background: var(--surface-soft); color: var(--muted); border: 1px solid var(--line); border-radius: 4px; font-size: 12px; font-weight: bold;">Xóa bộ lọc</button>
        </div>
        <div class="marks-table-wrap">
          <table class="course-list marks-table">
            <thead>
              <tr>
                <th style="width: 40px; text-align: center;"><input type="checkbox" id="selectAllMarks" checked style="cursor: pointer; transform: scale(1.1);" /></th>
                <th>Học kỳ</th>
                <th>Mã HP</th>
                <th>Tên học phần</th>
                <th class="credit-head">TC</th>
                <th class="grade-head">Điểm QT</th>
                <th class="grade-head">Điểm thi</th>
                <th class="grade-head">Điểm chữ</th>
                <th class="grade-head">Điểm cũ</th>
                <th class="grade-head">Điểm số</th>
              </tr>
            </thead>
            <tbody id="marksBody"></tbody>
          </table>
        </div>
      </section>

      <footer class="note">
        Nội dung bảng điểm có thể thay đổi theo thời gian. Extension luôn quét dữ liệu đang hiển thị trên trang, không dùng danh sách học phần cố định.
      </footer>
    </section>
  </div>
</template>

<template id="generalTemplate">
  <div class="backdrop" id="backdrop">
    <section class="panel" role="dialog" aria-modal="true" aria-labelledby="generalTitle">
      <header class="panel-head">
        <div>
          <p class="eyebrow">CTT-SIS HUST</p>
          <h2 id="generalTitle">Tổng quan kết quả học tập</h2>
          <p class="sub">Dữ liệu được quét trực tiếp từ bảng Kết quả học tập sinh viên hiện tại.</p>
        </div>
        <div class="btn-row">
          <button class="icon-btn close-btn" id="closeBtn" type="button" title="Đóng">× <span>Đóng</span></button>
        </div>
      </header>

      <section class="overview general-overview" aria-label="Tổng quan kết quả học tập">
        <article class="summary-card">
          <p class="label">Học kỳ gần nhất</p>
          <p class="metric"><span id="latestTerm">-</span></p>
        </article>
        <article class="summary-card">
          <p class="label">CPA hiện tại</p>
          <p class="metric"><span id="latestCpa">-</span></p>
        </article>
        <article class="summary-card">
          <p class="label">Tín chỉ tích lũy</p>
          <p class="metric"><span id="latestAccumulatedCredits">-</span> <small>TC</small></p>
        </article>
        <article class="summary-card">
          <p class="label">Cảnh báo</p>
          <p class="metric" id="latestWarningMetric"><span id="latestWarning">-</span></p>
        </article>
      </section>

      <section class="chart-grid general-chart-grid" aria-label="Biểu đồ kết quả học tập">
        <article class="chart-card">
          <div class="section-title">
            <h3>GPA và CPA</h3>
            <span class="soft-pill">Hệ 4</span>
          </div>
          <div id="gpaCpaChart"></div>
        </article>
        <article class="chart-card">
          <div class="section-title">
            <h3>Tín chỉ học kỳ</h3>
            <span class="soft-pill">Theo học kỳ</span>
          </div>
          <div id="termCreditChart"></div>
        </article>
        <article class="chart-card">
          <div class="section-title">
            <h3>Tín chỉ tích lũy</h3>
            <span class="soft-pill">Lũy kế</span>
          </div>
          <div id="cumulativeCreditChart"></div>
        </article>
        <article class="chart-card">
          <div class="section-title">
            <h3>Trình độ và cảnh báo</h3>
            <span class="soft-pill">Biểu đồ</span>
          </div>
          <div id="statusTimeline"></div>
        </article>
      </section>

      <section class="section-block">
        <div class="section-title">
          <h3>Chi tiết từng học kỳ</h3>
          <span class="soft-pill" id="generalCount">0 học kỳ</span>
        </div>
        <div class="marks-table-wrap">
          <table class="course-list general-table">
            <thead>
              <tr>
                <th>Học kỳ</th>
                <th>GPA</th>
                <th>CPA</th>
                <th>TC qua</th>
                <th>TC tích lũy</th>
                <th>TC nợ ĐK</th>
                <th>TC ĐK</th>
                <th>Trình độ</th>
                <th>Cảnh báo</th>
              </tr>
            </thead>
            <tbody id="generalBody"></tbody>
          </table>
        </div>
      </section>

      <footer class="note">
        Các biểu đồ dùng dữ liệu học kỳ đang có trên bảng CTT-SIS. Nếu trang chưa tải xong hoặc CTT-SIS đổi cấu trúc bảng, dữ liệu có thể cần quét lại bằng cách refresh trang.
      </footer>
    </section>
  </div>
</template>

<template id="dashboardTemplate">
  <div class="backdrop" id="backdrop">
    <section class="panel" role="dialog" aria-modal="true" aria-labelledby="dashboardTitle">
      <header class="panel-head">
        <div>
          <p class="eyebrow">CTT-SIS HUST</p>
          <h2 id="dashboardTitle">Tiến độ học tập</h2>
          <p class="sub">Dashboard tự động tổng hợp từ bảng Chương trình đào tạo trên trang hiện tại.</p>
        </div>
        <div class="btn-row">
          <button class="icon-btn" id="rescanBtn" type="button" title="Quét lại">↻ <span>Quét lại</span></button>
          <button class="icon-btn close-btn" id="closeBtn" type="button" title="Đóng">× <span>Đóng</span></button>
        </div>
      </header>

      <main>
        <section class="overview" aria-label="Tổng quan">
          <article class="summary-card hero-stat">
            <div id="gaugeSlot"></div>
            <div>
              <p class="label">CPA tích lũy</p>
              <p class="caption">Tính theo trọng số tín chỉ và điểm hệ 4.</p>
            </div>
          </article>
          <article class="summary-card">
            <p class="label">Tín chỉ tích lũy</p>
            <p class="metric"><span id="doneCredit">0</span>/<span id="trackedCredit">0</span> <small>TC</small></p>
            <p class="caption">Đã tích lũy <span id="doneCreditCaption">0</span> tín chỉ trong chương trình học.</p>
          </article>
          <article class="summary-card">
            <p class="label">Còn thiếu để tốt nghiệp</p>
            <p class="metric danger"><span id="missingCredit">0</span> <small>TC</small></p>
            <p class="caption" id="missingCreditCaption">Chưa gồm phần thiếu của mô đun chuyên ngành đã chọn.</p>
          </article>
        </section>

        <section class="section-block">
          <div class="section-title">
            <h3>Khối kiến thức</h3>
            <span id="courseCount" class="soft-pill">0 môn</span>
          </div>
          <div class="card-grid" id="categoryGrid"></div>
        </section>

        <section class="section-block">
          <div class="section-title">
            <h3>Mô đun chuyên ngành</h3>
            <span class="soft-pill">Bắt buộc</span>
          </div>
          <article class="module-panel" style="padding: 16px;">
            <p class="label" style="font-size: 11px; margin-bottom: 10px;">Chọn các mô đun chuyên ngành đã đăng ký</p>
            <div id="moduleCheckboxes" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;"></div>
            <div id="moduleBody"></div>
          </article>
        </section>
        
        <section class="section-block" id="missingCoursesSection">
          <div class="section-title">
            <h3>Học phần còn thiếu để tốt nghiệp</h3>
            <span class="soft-pill" id="missingCoursesCount" style="background: var(--red-soft); color: var(--red); border-color: #F0CCCC;">0 môn</span>
          </div>
          <div id="missingCoursesBody"></div>
        </section>

        <section class="section-block is-hidden" id="otherSection">
          <div class="section-title">
            <h3>Môn chưa phân loại</h3>
            <span class="soft-pill">Kiểm tra thủ công</span>
          </div>
          <div id="otherBody"></div>
        </section>
      </main>

      <footer class="note">
        Phân loại dựa trên nội dung "Ghi chú loại HP". Sau khi đổi bộ lọc hoặc chương trình trên trang CTT-SIS, bấm "Quét lại" để cập nhật số liệu.
      </footer>
    </section>
  </div>
</template>
